[build]
  publish = "."

[[redirects]]
  from = "/agents/*"
  to = "/agents.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# JSON Schema files — dereferenceable $id URLs for W3C VC ecosystem
[[headers]]
  for = "/schemas/*"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

# DID documents — cryptographic verification critical path
[[headers]]
  for = "/.well-known/did.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
