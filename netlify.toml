[build]
  publish = "."

# Internal pages are not for public serving. Return 404 for anything
# under /internal/ (force = true so the static files are not served).
[[redirects]]
  from = "/internal/*"
  to = "/404.html"
  status = 404
  force = true

# OP Crossrail product page — canonical extension-less URL.
[[redirects]]
  from = "/crossrail"
  to = "/crossrail.html"
  status = 200

# OP Enforcement — watch-first DENY demo, canonical extension-less URL.
[[redirects]]
  from = "/enforcement"
  to = "/enforcement.html"
  status = 200

# DID document resolution — must serve JSON per W3C did:web spec.
# The api. subdomain is the canonical source; proxy through the apex
# so the W3C-mandated path observerprotocol.org/agents/{id}/did.json
# returns the actual DID document instead of falling through to the
# human-readable agent listing page (agents.html). This rule MUST
# come before the /agents/* catch-all below.
[[redirects]]
  from = "/agents/:id/did.json"
  to = "https://api.observerprotocol.org/agents/:id/did.json"
  status = 200
  force = true

# Human-readable agent profile pages — existing behavior, preserved.
[[redirects]]
  from = "/agents/*"
  to = "/agents.html"
  status = 200

# Status list credentials — published as static .json files but the
# statusListCredential URL embedded in signed credentials omits the
# extension. Serve the .json content under the extension-less URL.
[[redirects]]
  from = "/status-lists/:id"
  to = "/status-lists/:id.json"
  status = 200

# Credentials — same pattern: signed credential 'id' fields and external
# references may omit .json; serve the underlying file either way.
[[redirects]]
  from = "/credentials/:id"
  to = "/credentials/:id.json"
  status = 200

# Serve status list and credential JSON with correct content-type + CORS.
[[headers]]
  for = "/status-lists/*"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/credentials/*"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# JSON Schema files — dereferenceable $id URLs for W3C VC ecosystem
[[headers]]
  for = "/schemas/*"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"

# DID documents — cryptographic verification critical path
[[headers]]
  for = "/.well-known/did.json"
  [headers.values]
    Content-Type = "application/json"
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=3600"
